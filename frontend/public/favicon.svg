<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Bar 1 (shortest) -->
  <rect x="4" y="22" width="4.5" height="6" rx="1" fill="url(#bar1)"/>

  <!-- Bar 2 -->
  <rect x="10" y="18" width="4.5" height="10" rx="1" fill="url(#bar2)"/>

  <!-- Bar 3 -->
  <rect x="16" y="13" width="4.5" height="15" rx="1" fill="url(#bar3)"/>

  <!-- Bar 4 (tallest, gold accent) -->
  <rect x="22" y="7" width="4.5" height="21" rx="1" fill="url(#bar4)"/>

  <!-- Gold trend line connecting bar tops -->
  <polyline
    points="6.25,22 12.25,18 18.25,13 24.25,7"
    fill="none"
    stroke="#fbbf24"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Gold dot at peak -->
  <circle cx="24.25" cy="7" r="1.8" fill="#fbbf24" stroke="#fde68a" stroke-width="0.8"/>
</svg>
